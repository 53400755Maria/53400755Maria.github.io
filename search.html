<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <title>Поисковые системы</title>
    <script>
        function openDialog(form) {
            // URL формы
            var url = form.action;
    
            // Определение параметров окна
            var params = 'left=100,top=100,width=600,height=400,toolbar=no,menubar=no,status=yes,location=no,resizable=yes,scrollbars=yes';
    
            // Открытие нового диалогового окна
            window.open(url, 'Dialog', params);
    
            // Предотвращение отправки формы
            return false;
        }
    </script>
</head>
<body>

    <style>
        body {
            background-color: #8cbece;
        }
    </style>

    <nav class="navbar sticky-top navbar-light bg-light">
        <div class="container">
            <div class="d-flex align-items-center">
                <a class="navbar-brand" href="index.html">Анкета</a>
                <a class="navbar-brand" href="index1.html">Анкета 2</a>
                <a class="navbar-brand" href="#">Поисковые системы</a>
            </div>
            <div class="ml-auto">
                <a href="entrance.html" class="btn btn-secondary">Выход</a>
            </div>
        </div>
    </nav> 

    <div class="container" style="margin-top: 11%;">
    <div class="row justify-content-center">
        <div class="col-md-4 mb-3">
            <div class="card">
                <div class="card-body">
                    <h3 class="card-title mb-4">Яндекс</h3> 
                    <form action="https://yandex.ru/search/" method="GET" class="input-group" onsubmit="return openDialog(this)" target="_blank">
                        <input type="text" name="text" class="form-control" placeholder="Поиск в Яндексе">
                        <input type="submit" class="btn btn-primary" value="Найти">
                    </form>
                </div>
            </div>
        </div>

        <div class="col-md-4 mb-3">
            <div class="card">
                <div class="card-body">
                    <h3 class="card-title mb-4">Rambler</h3> 
                    <form action="https://nova.rambler.ru/search/" method="GET" class="input-group" onsubmit="return openDialog(this)" target="_blank">
                        <input type="text" name="query" class="form-control"
                         placeholder="Поиск в Rambler">
                        <input type="submit" class="btn btn-primary" value="Найти">
                    </form>
                </div>
            </div>
        </div>

        <div class="col-md-4 mb-3">
            <div class="card">
                <div class="card-body">
                    <h3 class="card-title mb-4">Aport</h3> 
                    <form action="https://www.aport.ru/search/" method="GET" class="input-group" onsubmit="return openDialog(this)" target="_blank">
                        <input type="text" name="q" class="form-control" placeholder="Поиск в Aport">
                        <input type="submit" class="btn btn-primary" value="Найти">
                    </form>
                </div>
            </div>
        </div>

        <div class="col-md-4 mb-3">
            <div class="card">
                <div class="card-body">
                    <h3 class="card-title mb-4">Google</h3> 
                    <form action="https://www.google.com/search" method="GET" class="input-group" onsubmit="return openDialog(this)" target="_blank">
                        <input type="text" name="q" class="form-control" placeholder="Поиск в Google">
                        <input type="submit" class="btn btn-primary" value="Найти">
                    </form>
                </div>
            </div>
        </div>

        <div class="col-md-4 mb-3">
            <div class="card">
                <div class="card-body">
                    <h3 class="card-title mb-4">FileSearch</h3> 
                    <form action="http://www.filesearch.ru/search/" method="GET" class="input-group" onsubmit="return openDialog(this)" target="_blank">
                        <input type="text" name="q" class="form-control" placeholder="Поиск в FileSearch">
                        <input type="submit" class="btn btn-primary" value="Найти">
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>


    
</body>
</html>
