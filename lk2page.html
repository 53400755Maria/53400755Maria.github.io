<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="css/lk2.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <title>Личный кабинет</title>
</head>
<body>
    <nav class="navbar sticky-top navbar-light bg-light">
        <div class="container">
            <div class="d-flex align-items-center">
                <i class="fas fa-user custom-icon"></i>
                <a class="navbar-brand" href="#">Личный кабинет</a>
            </div>
            <div class="ml-auto">
                <a href="entrance.html" class="btn btn-secondary">Выход</a>
            </div>
        </div>
    </nav>    
      
    <div class="container-fluid">
        <div class="row justify-content-center">
          <div class="col-lg-8">
            <div class="card mx-lg-5">
              <div class="row g-0">
                <div class="col-md-4 text-center mt-5">
                  <img src="Image/lk.png" class="img-fluid rounded-circle" alt="Your Photo">
                  <div class="mt-3">
                    <label for="upload-photo" class="btn btn-primary">Загрузить фото</label>
                    <input type="file" id="upload-photo" style="display: none;">
                  </div>
                </div>
                <div class="col-md-8">
                  <div class="card-body">
                    <h5 class="card-title">Добро пожаловать в ваш личный кабинет!</h5>
                    <ul class="list-group list-group-flush">
                      <li class="list-group-item">
                        <form>
                          <div class="mb-3">
                            <label for="exampleInputFirstName" class="form-label">Имя:</label>
                            <input type="text" class="form-control" id="exampleInputFirstName" value="Мария">
                          </div>
                        </form>
                      </li>
                      <li class="list-group-item">
                        <form>
                          <div class="mb-3">
                            <label for="exampleInputLastName" class="form-label">Фамилия:</label>
                            <input type="text" class="form-control" id="exampleInputLastName" value="Бянкина">
                          </div>
                        </form>
                      </li>
                      <li class="list-group-item">
                        <form>
                          <div class="mb-3">
                            <label for="exampleInputEmail" class="form-label">Email:</label>
                            <input type="email" class="form-control" id="exampleInputEmail" value="byankinamaria534@gmail.com">
                          </div>
                        </form>
                      </li>
                      <li class="list-group-item">
                        <form>
                          <div class="mb-3">
                            <label for="exampleInputEmail" class="form-label">Телефон:</label>
                            <input type="email" class="form-control" id="exampleInputEmail" value="79929292929">
                          </div>
                        </form>
                      </li>
                    </ul>
                    <a href="#" class="btn btn-primary mt-3 d-block mx-auto">Сохранить изменения</a>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
