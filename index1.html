<body>

        <div class="container-fluid">
            <div class="row justify-content-center align-items-center" style="height: 100vh;">
                <div class="col-md-8">
                    <div class="card custom-card"> 
                        <div class="card-body text-center"> 
                <form action="http://127.0.0.1:5500" method="GET" onsubmit="return validateForm()">

                    <div class="col-md-4 offset-md-4 mb-3">
                        <label for="exampleInputSurname">Фамилия:</label><br>
                        <input type="text" class="form-control" id="exampleInputSurname" name="surname" value="Бянкина"><br>
                    </div>
                    
                    <div class="col-md-4 offset-md-4 mb-3">
                        <label for="exampleInputName">Имя:</label><br>
                        <input type="text" class="form-control" id="exampleInputName" name="name" value="Мария"><br>
                    </div>
                    
                    <div class="col-md-4 offset-md-4 mb-3">
                        <label for="patronymic">Отчество:</label><br>
                        <input type="text" class="form-control" id="patronymic" name="patronymic" value="Сергеевна"><br>
                    </div>
                    
                    <div class="col-md-4 offset-md-4 mb-3">
                        <label for="exampleInputEmail1">E-mail:</label><br> 
                        <input type="email" class="form-control" id="exampleInputEmail1" aria-describedby="emailHelp" name="email" value="byankinamaria534@gmail.com"><br>
                    </div>

                    <div class="col-md-4 offset-md-4 mb-3">
                        <div class="form-group">
                            <label for="country">Выбор страны:</label>
                            <select class="form-control" id="country" name="country">
                                <!-- Тег <select>: Определяет выпадающий список для выбора одного значения из списка -->
                                <option value="country1">Россия</option>
                                <option value="country2">США</option>
                                <option value="country3">Белорусия</option>
                                <option value="country4">Польша</option>
                                <option value="country5">Норвегия</option>
                                <option value="country6">Нидерланды</option>
                                <option value="country7">Казахстан</option>
                                <option value="country8">Великобритания</option>
                                <option value="country9">Китай</option>
                                <option value="country10">Тайланд</option>
                            </select>
                        </div>
                    </div>

                    <br>

                    <label>Выбор города:</label><br>
                    <input type="radio" id="city1" name="city" value="Казань">
                    <label for="city1">Уфа</label>
                    <input type="radio" id="city2" name="city" value="Москва">
                    <label for="city2">Нью-Йорк</label>
                    <input type="radio" id="city3" name="city" value="Санкт-Петербург">
                    <label for="city3">Алматы</label>
                    <input type="radio" id="city4" name="city" value="Чебоксары">
                    <label for="city4">Англия</label>
                    <input type="radio" id="city5" name="city" value="Набережные Челны">
                    <label for="city5">Шанхай</label><br>
                    
                    <br>
                    <br>
                    
                    <label>Выбор языка:</label><br>
                    <input type="checkbox" id="language1" name="language[]" value="Русский">
                    <label for="language1">Русский</label>
                    <input type="checkbox" id="language2" name="language[]" value="Английский">
                    <label for="language2">Английский</label>
                    <input type="checkbox" id="language3" name="language[]" value="Китайский">
                    <label for="language3">Китайский</label>
                    <input type="checkbox" id="language4" name="language[]" value="Казахский">
                    <label for="language4">Казахский</label>
                    <input type="checkbox" id="language5" name="language[]" value="Тайский">
                    <label for="language5">Тайский</label><br>
                    
                    <br>
                    <br>
                    
                    <div class="col-md-4 offset-md-4 mb-3">
                        <div class="form-group">
                            <label for="professions">Выбор профессий:</label><br>
                            <select id="professions" name="professions[]" multiple class="form-control">
                                <option value="Программист">Программист</option>
                                <option value="Журналист">Журналист</option>
                                <option value="Пилот">Пилот</option>
                                <option value="Фотограф">Фотограф</option>
                                <option value="Преподаватель">Преподаватель</option>
                                <option value="Актер">Актер</option>
                                <option value="Музыкант">Музыкант</option>
                                <option value="Врач">Врач</option>
                                <option value="Исследователь">Исследователь</option>
                                <option value="Водитель">Водитель</option>
                            </select><br>
                        </div>
                    </div>
                    
                    <div class="col-md-4 offset-md-4 mb-3">
                        <label for="password">Пароль:</label><br>
                        <input type="password" class="form-control" id="password" name="password"><br>
                    </div>
                    
                    <div class="col-md-4 offset-md-4 mb-3">
                        <label for="additional_info">Дополнительная информация:</label><br>
                        <textarea id="additional_info" class="form-control" name="additional_info"></textarea><br>
                    </div>
                    
                    <input type="hidden" name="student" value="Ваше_имя">
                    
                    <input type="submit" class="btn btn-primary mt-3 d-block mx-auto" value="Отправить">
                    <input type="reset" class="btn btn-primary mt-3 d-block mx-auto" value="Очистить">
                </form>
            </div>
        </div>
    </div>
</div>
</div>

<div class="body-content">
    <footer class="footer"> 
        <div class="footer-top"> 
            <h4 class="footer-top__item">Расписание</h4> 
            <h4 class="footer-top__item">Регистрация</h4>
            <h4 class="footer-top__item">Личный кабинет</h4>
            <h4 class="footer-top__item">Анкета</h4>
        </div>  
        <h6>Бянкина Мария, 4311-22</h6> 
        <h6 class="footer-top__item">©Quiz 2024. Все права защищены</h6>
    </footer>
</div>

<script>
    function validateForm() {
        var surname = document.getElementById('exampleInputSurname').value;
        var name = document.getElementById('exampleInputName').value;
        var email = document.getElementById('exampleInputEmail1').value;
        var password = document.getElementById('password').value;
        var country = document.getElementById('country').value;
        var city = document.querySelector('input[name="city"]:checked');

        if (surname === '' || name === '' || email === '' || password === '' || country === '' || city === null) {
            alert('Пожалуйста, заполните все обязательные поля.');
            return false;
        }

        return true;
    }
</script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-lx6zj+qxXLrFWUkQk5smoaxC9pooHX4/3J1x+XB6ZvQzfsH5FgKmENJe/qWuNfSh" crossorigin="anonymous"></script>
</body>
