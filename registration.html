<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="css/registration.css">
    <title>Регистрация</title>
</head>
<body>

    <nav class="navbar navbar-expand-lg bg-body-tertiary">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">Visit Tatarstan</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavAltMarkup" aria-controls="navbarNavAltMarkup" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNavAltMarkup">
                <div class="navbar-nav">
                    <a class="nav-link" href="entrance.html">О Татарстане</a>
                    <a class="nav-link active" aria-current="page" href="#">Регистрация</a>
                    <a class="nav-link" href="lk.html">Личный кабинет</a>
                </div>
            </div>
        </div>
    </nav>

    <div class="bg" style="background-image: url('Image/Image6.jpeg');">
    <div class="form-container">
        <div class="form-wrapper">
            <form class="needs-validation" novalidate>
                <div class="row">
                    <div class="col-md-4 offset-md-4 mb-3">
                        <div class="form-group">
                            <label for="validationServer01">Имя</label>
                            <input type="text" class="form-control is-valid" id="validationServer01" placeholder="Имя" required>
                        </div>
                    </div>
                    <div class="col-md-4 offset-md-4 mb-3">
                        <div class="form-group">
                            <label for="validationServer02">Фамилия</label>
                            <input type="text" class="form-control is-valid" id="validationServer02" placeholder="Фамилия" required>
                        </div>
                    </div>
                </div>
                <div class="row">
                    <div class="col-md-4 offset-md-4 mb-3">
                        <div class="form-group">
                            <label for="validationServerUsername">Адрес электронной почты</label>
                            <div class="input-group">
                                <div class="input-group-prepend">
                                    <span class="input-group-text" id="inputGroupPrepend3">@</span>
                                </div>
                                <input type="email" class="form-control is-invalid" id="validationServerUsername" placeholder="Email" aria-describedby="inputGroupPrepend3" required>
                                <div class="invalid-feedback">
                                    Пожалуйста, введите адрес электронной почты.
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="row">
                    <div class="col-md-4 offset-md-4 mb-3">
                        <div class="form-group">
                            <label for="validationServer04">Пароль</label>
                            <input type="password" class="form-control is-invalid" id="validationServer04" placeholder="Пароль" required>
                            <div class="invalid-feedback">
                                Пожалуйста, придумайте пароль.
                            </div>
                        </div>
                    </div>
                </div>
                <div class="row">
                    <div class="col-md-4 offset-md-4 mb-3">
                        <div class="form-group form-check">
                            <input class="form-check-input is-invalid" type="checkbox" value="" id="invalidCheck3" required>
                            <label class="form-check-label" for="invalidCheck3">
                                Согласен с условиями и положениями
                            </label>
                            <div class="invalid-feedback">
                                Вы должны согласиться перед созданием аккаунта
                            </div>
                        </div>
                    </div>
                </div>
                <div class="row">
                    <div class="col-md-4 offset-md-4 mb-3">
                        <a href="lk2page.html" class="btn btn-primary btn-lg btn-block" type="submit">Создать аккаунт</a>
                    </div>
                </div>
            </form>
        </div>
    </div>
    </div>
    
    <div class="body-content">
        <footer class="footer"> 
            <div class="footer-top"> 
                <h5 class="footer-top__item">Расписание</h5> 
                <h5 class="footer-top__item">Регистрация</h5>
                <h5 class="footer-top__item">Личный кабинет</h5>
                <h5 class="footer-top__item">Анкета</h5>
            </div>  
            <h6>Бянкина Мария, 4311-22</h6> 
            <h6 class="footer-top__item">©Quiz 2024. Все права защищены</h6>
        </footer>
    </div>
    

    
    <script src="registration.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
